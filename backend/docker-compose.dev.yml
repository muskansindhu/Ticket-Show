version: "3.8"

services:
  # 1 PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ticket-show-postgres
    environment:
      POSTGRES_USER: ticketshow
      POSTGRES_PASSWORD: ticketshow123
      POSTGRES_DB: ticketshow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketshow -d ticketshow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ticket-show-network

  # 2 Auth Service (DEV MODE)
  auth-service:
    build:
      context: .
      dockerfile: services/auth_service/Dockerfile
    container_name: ticket-show-auth
    volumes:
      - ./services/auth_service:/app
      - ./shared:/app/shared
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://ticketshow:ticketshow123@postgres:5432/ticketshow
      - JWT_SECRET=super-secret-key
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ticket-show-network

  # 3 Event Service (DEV MODE)
  event-service:
    build:
      context: .
      dockerfile: services/event_service/Dockerfile
    container_name: ticket-show-event
    volumes:
      - ./services/event_service:/app
      - ./shared:/app/shared
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DATABASE_URL=postgresql+asyncpg://ticketshow:ticketshow123@postgres:5432/ticketshow
      - JWT_SECRET=super-secret-key
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ticket-show-network

  # 4 API Gateway (DEV MODE)
  api-gateway:
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile
    container_name: ticket-show-gateway
    volumes:
      - ./services/api_gateway:/app
      - ./shared:/app/shared
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8000
      - EVENT_SERVICE_URL=http://event-service:8000
      - JWT_SECRET=super-secret-key
    depends_on:
      - auth-service
    networks:
      - ticket-show-network

networks:
  ticket-show-network:
    driver: bridge

volumes:
  postgres_data:
